<html>
    <body align="center">
        
<style>
            input[type="textfield"]
            {
                width:50%;
                border:2px;
                background-color:pink;
                padding:10px;
                margin:10px;
                font-size:20px;
            }
            input[type="email"]
            {
                width:50%;
                border:2px;
                background-color:blue;
                padding:10px;
                margin:10px;
                font-size:20px;
            }
             input[type="number"]
            {
                width:50%;
                border:2px;
                background-color:yellow;
                padding:10px;
                margin:10px;
                font-size:20px;
            }
            
        
        </style>

        
        <h1 align="center">Registration Form</h1>
        <form  align="center">
            username<input type="textfield"  placeholder="enter name" id="us"><br>
            emailId <input type="email" id="e"><br>
            mobile<input type="number" id="ph"><br>
            <input type="submit" value="submit" onclick=" return validate()">
        </form>
        <script>
            function validate()
            {
                var un=document.getElementById("us");
                var em=document.getElementById("e");
                var m=document.getElementById("ph");
                var uname=un.value;
                var mobile=m.value;
                var email=em.value;
                var unre=/^[a-zA-Z]+[0-9a-zA-Z._]*$/;
                var ere=/^[a-zA-Z]+([\._]?\w+)*@\w+([\._]?\w+)*(\.\w{2,3})+$/;
                var mre=/^[6-9][0-9]{9}$/;
                if(unre.test(uname))
            {
                if(ere.test(email))
            {
                if(mre.test(mobile))
            {
                alert("Registered susccessfully");
                return true;
            }
            else{
                return error(m);
            }
            
            }
            else{
                return error(em);
            }
            }
            else{
                return error(un);
            }
            }
            function error(ele)
            {
                alert("invalid");
                ele.style.border="2px solid red"
                ele.value="";
                ele.placeholder="invalid";
                ele.focus();
                return false;
            }

            </script>
    </body>
</html>
